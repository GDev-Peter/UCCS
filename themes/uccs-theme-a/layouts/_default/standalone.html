{{ define "head_extra" }}
  <link rel="stylesheet" href="{{ "css/prose.css" | relURL }}">
{{ end }}

{{ define "main" }}
<article class="standalone-page">

  <header class="standalone-header">
    <p class="standalone-overline">{{ site.Title }}</p>
    <h1>{{ .Title }}</h1>
  </header>

  <div class="article-body">
    {{ .Content }}
  </div>

</article>
{{ end }}
