<!-- layouts/_partials/header.html -->
<header class="site-footer">
    <div class="column-container__footer">
        <a href="{{ "/" | relLangURL }}" class="logo">
            <span class="site-header__title">{{ site.Title }}</span><br>
            <span class="site-header__subtitle">{{ site.Params.subtitle }}</span>
        </a>
        <nav class="site-nav" aria-label="Primary">
            <ul>
                {{ range site.Menus.main }}
                <li><a href="{{ .URL | relLangURL }}">{{ .Name }}</a></li>
                {{ end }}
            </ul>
        </nav>
            <nav class="site-nav" aria-label="Secundary">
            <ul>
                {{ range site.Menus.utility }}
                <li><a href="{{ .URL | relLangURL }}">{{ .Name }}</a></li>
                {{ end }}
            </ul>
        </nav>
    </div>
    <p>© Copyright 2025 - {{ now.Year }}. All rights reserved.</p>
</header>
