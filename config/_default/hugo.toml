baseURL = "https://gdev-peter.github.io/UCCS/"  # GitHub Pages — de înlocuit la domeniu propriu
title = "UCCS"

theme = "uccs-theme-a"

defaultContentLanguage = "ro"
languageCode = "ro-RO"

enableRobotsTXT = false

# relativeURLs = true asigură că toate link-urile funcționează indiferent
# de unde e hostat site-ul, fără să depindă de baseURL la build local.
canonifyURLs = false
relativeURLs = true

# Workflow-ul GitHub Actions suprascrie baseURL la build cu:
# --baseURL "${{ steps.pages.outputs.base_url }}/"
# deci în producție baseURL e întotdeauna corect.

pagerSize = 12
summaryLength = 30

[caches]
  [caches.images]
    dir = ':cacheDir/images'
