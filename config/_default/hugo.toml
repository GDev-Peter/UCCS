baseURL = "https://gdev-peter.github.io/UCCS/"  # GitHub Pages — de inlocuit la domeniu propriu
title = "UCCS"

theme = "uccs-theme-a"

defaultContentLanguage = "ro"
languageCode = "ro-RO"

enableRobotsTXT = false

# relativeURLs = false + baseURL corect = Hugo genereaza toate URL-urile absolut
# Workflow-ul GitHub Actions suprascrie baseURL la build cu:
# --baseURL "${{ steps.pages.outputs.base_url }}/"
canonifyURLs = false
relativeURLs = false

pagerSize = 12
summaryLength = 30

[caches]
  [caches.images]
    dir = ':cacheDir/images'
